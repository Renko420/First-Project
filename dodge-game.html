<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dodge Blocks</title>
  <style>
    body {
      margin: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }
    canvas {
      border: 2px solid #444;
      background: #16213e;
      display: block;
    }
    #ui {
      margin-top: 12px;
      font-size: 18px;
      display: flex;
      gap: 30px;
      align-items: center;
    }
    #restartBtn {
      padding: 8px 20px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      display: none;
    }
    #restartBtn:hover { background: #c73652; }
  </style>
</head>
<body>
  <canvas id="c" width="400" height="500"></canvas>
  <div id="ui">
    <span>Score: <strong id="scoreDisplay">0</strong></span>
    <span id="statusMsg"></span>
    <button id="restartBtn" onclick="restart()">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const PLAYER_W = 50;
    const PLAYER_H = 15;
    const BLOCK_W = 50;
    const BLOCK_H = 20;

    let player, blocks, score, gameOver, spawnTimer, speed, keys;

    function init() {
      player = { x: canvas.width / 2 - PLAYER_W / 2, y: canvas.height - 40 };
      blocks = [];
      score = 0;
      gameOver = false;
      spawnTimer = 0;
      speed = 3;
      keys = {};
      document.getElementById('scoreDisplay').textContent = '0';
      document.getElementById('statusMsg').textContent = '';
      document.getElementById('restartBtn').style.display = 'none';
    }

    function restart() { init(); loop(); }

    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup',   e => keys[e.key] = false);

    function spawnBlock() {
      const x = Math.random() * (canvas.width - BLOCK_W);
      blocks.push({ x, y: -BLOCK_H });
    }

    function update() {
      // Move player
      if ((keys['ArrowLeft']  || keys['a']) && player.x > 0)
        player.x -= 5;
      if ((keys['ArrowRight'] || keys['d']) && player.x + PLAYER_W < canvas.width)
        player.x += 5;

      // Spawn blocks
      spawnTimer++;
      const interval = Math.max(25, 60 - Math.floor(score / 10));
      if (spawnTimer >= interval) {
        spawnBlock();
        spawnTimer = 0;
      }

      // Move blocks down
      for (const b of blocks) b.y += speed;

      // Remove off-screen blocks and increase score
      for (let i = blocks.length - 1; i >= 0; i--) {
        if (blocks[i].y > canvas.height) {
          blocks.splice(i, 1);
          score++;
          document.getElementById('scoreDisplay').textContent = score;
          // Speed up every 5 points
          speed = 3 + Math.floor(score / 5) * 0.5;
        }
      }

      // Collision check
      for (const b of blocks) {
        if (
          player.x < b.x + BLOCK_W &&
          player.x + PLAYER_W > b.x &&
          player.y < b.y + BLOCK_H &&
          player.y + PLAYER_H > b.y
        ) {
          gameOver = true;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Player (cyan)
      ctx.fillStyle = '#00d4ff';
      ctx.fillRect(player.x, player.y, PLAYER_W, PLAYER_H);

      // Blocks (red-orange)
      ctx.fillStyle = '#e94560';
      for (const b of blocks) ctx.fillRect(b.x, b.y, BLOCK_W, BLOCK_H);
    }

    function loop() {
      if (gameOver) {
        draw();
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Arial';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 40);
        document.getElementById('restartBtn').style.display = 'inline-block';
        return;
      }
      update();
      draw();
      requestAnimationFrame(loop);
    }

    init();
    loop();
  </script>
</body>
</html>
