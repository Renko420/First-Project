<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropshipping Profit Calculator</title>
    <style>
      /* ── Reset & base ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      /* ── Card ── */
      .card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        padding: 40px 36px;
        width: 100%;
        max-width: 440px;
      }

      h1 {
        font-size: 1.4rem;
        font-weight: 700;
        color: #1a202c;
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: 0.875rem;
        color: #718096;
        margin-bottom: 32px;
      }

      /* ── Input group ── */
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-bottom: 32px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.875rem;
        font-weight: 600;
        color: #2d3748;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper span {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #a0aec0;
        font-size: 1rem;
        pointer-events: none;
      }

      input[type="number"] {
        width: 100%;
        padding: 12px 14px 12px 30px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
        color: #1a202c;
        outline: none;
        transition: border-color 0.2s;
        appearance: textfield; /* hide spin arrows in Firefox */
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { appearance: none; }

      input[type="number"]:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
      }

      /* ── Results ── */
      .results {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .result-box {
        border-radius: 12px;
        padding: 20px 16px;
        text-align: center;
        transition: background 0.3s, color 0.3s;
      }

      .result-box .label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        opacity: 0.75;
      }

      .result-box .value {
        font-size: 1.6rem;
        font-weight: 800;
      }

      /* Positive / neutral */
      #profit-box {
        background: #f0fff4;
        color: #276749;
      }

      #margin-box {
        background: #ebf4ff;
        color: #2b6cb0;
      }

      /* Negative profit overrides */
      #profit-box.negative {
        background: #fff5f5;
        color: #c53030;
      }

      #margin-box.negative {
        background: #fff5f5;
        color: #c53030;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Dropshipping Calculator</h1>
      <p class="subtitle">Enter your numbers to see profit instantly.</p>

      <div class="input-group">
        <label>
          Selling Price
          <div class="input-wrapper">
            <span>$</span>
            <input type="number" id="price" placeholder="e.g. 39.99" min="0" step="0.01" />
          </div>
        </label>

        <label>
          Product Cost
          <div class="input-wrapper">
            <span>$</span>
            <input type="number" id="cost" placeholder="e.g. 12.00" min="0" step="0.01" />
          </div>
        </label>

        <label>
          Ad Spend
          <div class="input-wrapper">
            <span>$</span>
            <input type="number" id="ads" placeholder="e.g. 8.00" min="0" step="0.01" />
          </div>
        </label>
      </div>

      <div class="results">
        <div class="result-box" id="profit-box">
          <div class="label">Profit</div>
          <div class="value" id="profit-value">—</div>
        </div>
        <div class="result-box" id="margin-box">
          <div class="label">Margin</div>
          <div class="value" id="margin-value">—</div>
        </div>
      </div>
    </div>

    <script>
      const inputs = ['price', 'cost', 'ads'].map(id => document.getElementById(id));
      const profitBox  = document.getElementById('profit-box');
      const marginBox  = document.getElementById('margin-box');
      const profitVal  = document.getElementById('profit-value');
      const marginVal  = document.getElementById('margin-value');

      function calculate() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const cost  = parseFloat(document.getElementById('cost').value)  || 0;
        const ads   = parseFloat(document.getElementById('ads').value)   || 0;

        // Nothing entered yet — reset to placeholder dashes
        if (price === 0 && cost === 0 && ads === 0) {
          profitVal.textContent = '—';
          marginVal.textContent = '—';
          profitBox.classList.remove('negative');
          marginBox.classList.remove('negative');
          return;
        }

        const profit = price - cost - ads;
        const margin = price > 0 ? (profit / price) * 100 : 0;
        const isNeg  = profit < 0;

        profitVal.textContent = (isNeg ? '-$' : '$') + Math.abs(profit).toFixed(2);
        marginVal.textContent = margin.toFixed(1) + '%';

        profitBox.classList.toggle('negative', isNeg);
        marginBox.classList.toggle('negative', isNeg);
      }

      inputs.forEach(input => input.addEventListener('input', calculate));
    </script>
  </body>
</html>
