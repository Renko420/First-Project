<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropshipping Profit Calculator</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      /* ── Card ── */
      .card {
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        padding: 48px 40px 40px;
        width: 100%;
        max-width: 460px;
      }

      .card-header {
        margin-bottom: 36px;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: #1a202c;
        margin-bottom: 4px;
        letter-spacing: -0.02em;
      }

      .subtitle {
        font-size: 0.875rem;
        color: #a0aec0;
      }

      /* ── Input group ── */
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-bottom: 36px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 0.8rem;
        font-weight: 700;
        color: #4a5568;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper span {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #cbd5e0;
        font-size: 1rem;
        font-weight: 600;
        pointer-events: none;
      }

      input[type="number"] {
        width: 100%;
        padding: 14px 16px 14px 34px;
        border: 2px solid #edf2f7;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 500;
        color: #1a202c;
        background: #f7fafc;
        outline: none;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        appearance: textfield;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { appearance: none; }

      input[type="number"]:focus {
        border-color: #667eea;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(102,126,234,0.12);
      }

      input[type="number"]::placeholder {
        color: #cbd5e0;
        font-weight: 400;
      }

      /* ── Divider ── */
      .divider {
        height: 1px;
        background: #edf2f7;
        margin-bottom: 28px;
      }

      /* ── Results ── */
      .results {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Profit — hero box */
      #profit-box {
        border-radius: 18px;
        padding: 28px 24px;
        text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        transition: background 0.35s;
      }

      #profit-box .label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 10px;
        opacity: 0.8;
      }

      #profit-box .value {
        font-size: 2.6rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      #profit-box.negative {
        background: linear-gradient(135deg, #fc4e4e 0%, #c53030 100%);
      }

      /* Margin — secondary box */
      #margin-box {
        border-radius: 14px;
        padding: 18px 20px;
        text-align: center;
        background: #f7fafc;
        color: #2d3748;
        border: 2px solid #edf2f7;
        transition: background 0.3s, border-color 0.3s, color 0.3s;
      }

      #margin-box .label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 6px;
        color: #a0aec0;
      }

      #margin-box .value {
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      #margin-box.negative {
        background: #fff5f5;
        border-color: #fed7d7;
        color: #c53030;
      }

      #margin-box.negative .label {
        color: #fc8181;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <h1>Profit Calculator</h1>
        <p class="subtitle">Enter your numbers to see profit instantly.</p>
      </div>

      <div class="input-group">
        <label>
          Selling Price
          <div class="input-wrapper">
            <span>$</span>
            <input type="number" id="price" placeholder="0.00" min="0" step="0.01" />
          </div>
        </label>

        <label>
          Product Cost
          <div class="input-wrapper">
            <span>$</span>
            <input type="number" id="cost" placeholder="0.00" min="0" step="0.01" />
          </div>
        </label>

        <label>
          Ad Spend
          <div class="input-wrapper">
            <span>$</span>
            <input type="number" id="ads" placeholder="0.00" min="0" step="0.01" />
          </div>
        </label>
      </div>

      <div class="divider"></div>

      <div class="results">
        <div id="profit-box">
          <div class="label">Net Profit</div>
          <div class="value" id="profit-value">—</div>
        </div>
        <div id="margin-box">
          <div class="label">Profit Margin</div>
          <div class="value" id="margin-value">—</div>
        </div>
      </div>
    </div>

    <script>
      const inputs = ['price', 'cost', 'ads'].map(id => document.getElementById(id));
      const profitBox = document.getElementById('profit-box');
      const marginBox = document.getElementById('margin-box');
      const profitVal = document.getElementById('profit-value');
      const marginVal = document.getElementById('margin-value');

      function calculate() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const cost  = parseFloat(document.getElementById('cost').value)  || 0;
        const ads   = parseFloat(document.getElementById('ads').value)   || 0;

        if (price === 0 && cost === 0 && ads === 0) {
          profitVal.textContent = '—';
          marginVal.textContent = '—';
          profitBox.classList.remove('negative');
          marginBox.classList.remove('negative');
          return;
        }

        const profit = price - cost - ads;
        const margin = price > 0 ? (profit / price) * 100 : 0;
        const isNeg  = profit < 0;

        profitVal.textContent = (isNeg ? '-$' : '$') + Math.abs(profit).toFixed(2);
        marginVal.textContent = margin.toFixed(1) + '%';

        profitBox.classList.toggle('negative', isNeg);
        marginBox.classList.toggle('negative', isNeg);
      }

      inputs.forEach(input => input.addEventListener('input', calculate));
    </script>
  </body>
</html>
